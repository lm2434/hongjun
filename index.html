<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>长征路线时空漫游</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", sans-serif;
        }

        /* 页面布局：左侧侧边栏 + 右侧2D地图 */
        body {
            display: flex;
            height: auto; /* 高度跟随内容（地图图片），而非固定视口 */
            min-height: 100vh; /* 最小高度保证占满屏幕 */
            overflow: visible; /* 取消溢出隐藏，让内容自然展示 */
            position: relative; /* 为侧边栏粘性定位做准备 */
        }

        /* ====================== 右上角【返回主页面】按钮 ====================== */
        #backHomeBtn {
            position: fixed; /* 固定在右上角，滚动不移动 */
            top: 20px;
            right: 20px;
            z-index: 9999; /* 最高层级，不被遮挡 */
            width: 50px;    /* 窄一点 */
            height: 50px;    /* 矮一点 */
            padding: 5px;
            background: #8B0000;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            align-items: center;
            justify-content: center; /* 图片居中 */
        }
        #backHomeBtn:hover {
            background: #a50000;
            transform: scale(1.05);
        }
        /* 返回图标样式 */
        .back-icon {
            width: 100%;
            height: 100%;
            object-fit: contain; /* 保持图片比例，不拉伸 */
        }

        /* ====================== 左侧可折叠面板 ====================== */
        #sidebar {
            width: 300px;
            height: 100%;
            background: #8B0000;
            color: white;
            padding: 20px;
            /* 折叠动画 */
            transition: width 0.3s ease;
            flex-shrink: 0;
            overflow-y: auto; /* 核心：开启垂直滚动 */
            overflow-x: hidden; /* 隐藏水平滚动 */
            position: sticky; /* 粘性定位，滚动时侧边栏保持在左侧 */
            top: 0; /* 粘性定位锚定顶部 */
        }

        /* 折叠状态样式 */
        #sidebar.collapsed {
            width: 60px;
            padding: 20px 5px;
        }

        /* 折叠后隐藏文字，只留按钮 */
        #sidebar.collapsed h2,
        #sidebar.collapsed .btn-group {
            display: none;
        }

        /* 折叠按钮 */
        #toggleBtn {
            width: 100%;
            padding: 10px;
            background: white;
            color: #8B0000;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
        }


        /* 节点按钮 */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .node-btn {
            padding: 12px;
            background: rgba(255,255,255,0.2);
            border: 1px solid white;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            text-align: left;
        }

        .node-btn:hover {
            background: white;
            color: #8B0000;
        }

        /* BGM控制按钮样式 */
.bgm-control {
  margin: 20px 0;
}
#bgmBtn {
  width: 100%;
  background: rgba(255,255,255,0.3);
  transition: all 0.3s ease;
}
#bgmBtn.playing {
  background: white;
  color: #8B0000;
}

        /* ====================== 右侧2D地图 ====================== */
        #map {
            flex: 1;
            /*background-image: url('/assets/map_base.jpg');
            background-size: cover; /* 保留铺满，超出部分可滚动 */
            /*background-position: center;*/
            position: relative;
            overflow: auto; /* 开启滚动条，查看完整图片 */
            min-width: 300px; /* 最小宽度，避免小屏挤压 */
            height: auto; /* 占满视口高度 */
        }

        .map-wrapper {
            position: relative; /* 绝对定位的父容器（关键！） */
            width: 100%;       /* 跟随图片宽度 */
            height: auto;      /* 跟随图片高度 */
            margin: 0 auto;    /* 图片居中 */
        }
        
        /* 地图图片样式（关键修复：控制img尺寸，避免重叠） */
        .map-img {
            width: 100%; /* 适配容器宽度 */
            height: auto; /* 保持宽高比 */
            display: block; /* 消除img默认行内间隙 */
        }

        /* 地图节点红点样式 */
        .map-point {
            width: 20px;
            height: 20px;
            background: red;
            border-radius: 50%;
            position: absolute;
            border: 3px solid white;
            cursor: pointer;
            transform: translate(-50%, -50%);
            z-index: 10; /* 保证红点在图片上方 */
        }

        /* 地图图片样式 */


        /* 节点文字 */
        .point-label {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            background: black;
            color: white;
            padding: 2px 5px;
            font-size: 12px;
            border-radius: 3px;
            white-space: nowrap;
        }

        /* ====================== 弹窗样式 ====================== */
        #modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            background: white;
            padding: 30px;
            border: 4px solid #8B0000;
            border-radius: 10px;
            z-index: 999;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }

        #modal h2 {
            color: #8B0000;
            text-align: center;
            margin-bottom: 15px;
        }

        #modal p {
            line-height: 1.8;
            font-size: 16px;
            margin: 10px 0;
        }

        .close-btn {
            background: #8B0000;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        /* 在 index.html 的 <style> 区域新增 */
        #modal video {
            width: 100%;
            height: auto;        /* 自动适配高度，不变形 */
            margin-top: 15px;
            border-radius: 5px;
            outline: none;
        }
    </style>
</head>

            if(type === 'huining'){

        // 关闭弹窗
        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        // 新增：BGM控制逻辑
        const bgm = document.getElementById('bgm');
        const bgmBtn = document.getElementById('bgmBtn');
        bgm.volume = 0.3;
        bgmBtn.addEventListener('click', () => {
            if (bgm.muted) {
                bgm.muted = false;
                bgm.play();
                bgmBtn.textContent = '暂停背景音乐';
                bgmBtn.classList.add('playing');
            } else {
                bgm.muted = true;
                bgm.pause();
                bgmBtn.textContent = '开启背景音乐';
                bgmBtn.classList.remove('playing');
            }
        });
        // 音频加载失败提示
        bgm.addEventListener('error', () => {
            console.error('BGM加载失败，请检查文件路径！');
            bgmBtn.textContent = '背景音乐加载失败';
            bgmBtn.disabled = true;
        });
    </script>
