<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>长征主题主页面</title>
    <style>
        /* 沿用原有样式风格，保证视觉统一 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", sans-serif;
        }

        body {
            background-color: #f5f5f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* 页面标题 */
        .page-title {
            color: #8B0000;
            font-size: 36px;
            margin-bottom: 30px;
            text-align: center;
        }

        /* 视频容器 - 适配不同屏幕 */
        .video-container {
            width: 100%;
            max-width: 1000px;
            background-color: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        .main-video {
            width: 100%;
            height: auto;
            border-radius: 5px;
            outline: none;
        }

        /* 跳转按钮 - 沿用原有按钮风格 */
        .jump-btn {
            padding: 15px 40px;
            background: #8B0000;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .jump-btn:hover {
            background: #a50000;
            transform: scale(1.05);
        }

        /* 响应式适配 */
        @media (max-width: 768px) {
            .page-title {
                font-size: 28px;
            }
            .video-container {
                padding: 10px;
            }
            .jump-btn {
                width: 100%;
                max-width: 300px;
            }
        }
    </style>
</head>
<body>
    <!-- 页面标题 -->
    <h1 class="page-title">长征 - 不朽的红色丰碑</h1>

    <!-- 核心视频区域 -->
    <div class="video-container">
        <video class="main-video" controls>
            <!-- 主视频文件（请替换为实际视频路径） -->
            <source src="assets/hongjun.mp4" type="video/mp4">
            <!-- 兼容低版本浏览器 -->
            您的浏览器不支持HTML5视频播放，请升级至最新版本浏览器。
        </video>
    </div>

    <!-- 跳转至长征路线时空漫游页面 -->
    <button class="jump-btn" onclick="window.location.href='index.html'">
        点击进入长征路线时空漫游
    </button>
</body>
</html>
